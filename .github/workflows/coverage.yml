name: Coverage

on:
  pull_request:
    branches: [ "master" ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Check coverage
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          test-script: pnpm test
          package-manager: pnpm
